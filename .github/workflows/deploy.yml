name: Deploy to Lightsail

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: admin
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: ".next/standalone/,.next/static/"
          target: "/home/admin/app/.next/"
          strip_components: 1

      - name: Upload public folder to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: admin
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "public/"
          target: "/home/admin/app/"

      - name: Restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: admin
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            rm -rf /home/admin/app/.next/standalone/.next/static
            cp -r /home/admin/app/.next/static /home/admin/app/.next/standalone/.next/static
            rm -rf /home/admin/app/.next/standalone/public
            cp -r /home/admin/app/public /home/admin/app/.next/standalone/public
            pm2 restart aljaiker
